name: Build Java Project

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: action/checkout@4
    - uses: actions/setup-java@4
      with:
        java-version: '24'
        distribution: 'temurin'
    - run: mvn compile
    - run: mvn package
    - uses: actions/upload-artifact@v4.6.2
      with:
        name: Wochenbericht.jar
        path: ./target/WochenBericht-1.0-SNAPSHOT.jar